app:
  name: "ONT Tester NEXUS"
  version: "0.1.0"
  environment: "development"

monitor:
  heartbeat_interval_s: 1.0
  poll_interval_s: 1.0
  disconnect_threshold: 3
  ping_timeout_ms: 500

workers:
  max_workers: 24
  worker_join_timeout_s: 5.0

ui:
  enabled: true
  refresh_interval_ms: 500

logging:
  level: "INFO"
  logs_dir: "data/logs"

database:
  enabled: true
  path: "data/runtime/nexus.db"
  init_on_startup: true

selenium:
  browser: "chrome"
  headless: true
  implicit_wait_s: 2
  page_load_timeout_s: 20
  script_timeout_s: 20
  window_width: 1400
  window_height: 900
  chrome_binary_path: "tools/browser/chrome-win64/chrome.exe"
  chromedriver_path: "tools/browser/chromedriver-win64/chromedriver.exe"

auto_execution:
  enabled: true
  trigger_on_connect: true

wifi:
  scan_retries: 15
  scan_retry_delay_s: 2
  stabilization_delay_s: 8

paths:
  bins_root: "C:/ONT-NEXUS/bins"

software_update:
  enabled: true
  max_login_retries: 5
  login_retry_delay_s: 10
  post_upload_delay_s: 2
  reboot_wait_down_s: 120
  ping_return_timeout_s: 300
  post_reboot_stabilization_s: 60
  vendors:
    fiberhome:
      superuser_username: "admin"
      superuser_password: "z#Wh46QN@52Rm%j5"
      models:
        MOD001: "fiberhome/HG6145F"
        MOD008: "fiberhome/HG6145F1"
      aliases:
        HG6145F: "MOD001"
        HG6145F1: "MOD008"